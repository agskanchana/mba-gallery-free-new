name: Deploy to WordPress.org (dry-run)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PLUGIN_SLUG: medical-before-after-gallery

jobs:
  dryrun:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y subversion rsync

      - name: Determine tag (optional input fallback)
        id: vars
        run: |
          # For manual runs there is no release object; you can set TAG via input when triggering if needed.
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # default empty is OK for a trunk-only dry-run
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "Dry-run tag: ${TAG}"

      - name: Prepare svn checkout for dry-run
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          PLUGIN_SLUG: ${{ env.PLUGIN_SLUG }}
        run: |
          set -euo pipefail
          TAG=${{ steps.vars.outputs.TAG }}
          SVN_URL="https://plugins.svn.wordpress.org/${PLUGIN_SLUG}"
          echo "SVN_URL=${SVN_URL}"

          # Checkout WP.org SVN top-level (no commits will be made)
          rm -rf svn || true
          svn checkout "${SVN_URL}" svn --depth immediates --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive || true

          mkdir -p svn/trunk svn/tags
          svn update svn/trunk --set-depth infinity --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive || true

          # Populate local trunk with repository contents for inspection
          rm -rf svn/trunk/*
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.github/workflows' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='build' \
            --exclude='vendor' \
            ./ svn/trunk/

          if [ -d "assets" ]; then
            mkdir -p svn/assets
            rsync -av --delete assets/ svn/assets/
          fi

          cd svn

          # Show what would be added/removed/changed
          echo "=== SVN STATUS (what would change) ==="
          svn status || true

          echo "=== NEW (unversioned) files ==="
          svn status | awk '/^\?/{print $2}' || true

          echo "=== MISSING (deleted) files ==="
          svn status | awk '/^!/{print $2}' || true

          echo "=== DIFF (summary) ==="
          svn diff --summarize || true

          echo "DRY RUN: no svn commit or tag will be created by this workflow."